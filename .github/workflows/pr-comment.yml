name: PR Comment

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - unlocked

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: write-all
    steps:
      - uses: actions/checkout@v3

      - uses: mshick/add-pr-comment@v2
        with:
          repo-token: ${{ secrets.PERSONAL_TOKEN }}
          message-id: pr-test
          message: |
            Thanks for opening this pull request and contributing to the project!

            The next step is for the maintainers to review your changes. If everything looks good, it will be approved and merged into the main branch.

            In the meantime, anyone in the community is encouraged to test this pull request and provide feedback.

            ### ✅ How to confirm it works

            If you’ve tested this PR, please comment below with:

            ```
            Tested and working ✅
            ```

            This helps us speed up the review and merge process.

            ### 📦 To test this PR locally:

            Baileys is now a pnpm monorepo, so installing the branch directly
            (`npm/yarn/pnpm add <owner/repo>#<branch>`) no longer works — that resolves the
            private monorepo root instead of the `baileys` package. Clone the branch, build,
            and pack the package, then install the resulting tarball:

            ```bash
            git clone --branch ${{ github.event.pull_request.head.ref }} --single-branch https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git baileys-pr
            cd baileys-pr && pnpm install && pnpm --filter baileys pack
            # then, in your own project, install the tarball it produced:
            #   npm install /absolute/path/to/baileys-pr/packages/baileys/baileys-*.tgz
            ```

            If you encounter any issues or have feedback, feel free to comment as well.
