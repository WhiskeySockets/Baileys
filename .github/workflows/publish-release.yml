name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetching tags
        run: git fetch --tags -f || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports Trusted Publishers
        run: npm install -g npm@latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # rc / beta / alpha → that dist-tag; stable → latest. Avoids clobbering `latest` with a prerelease.
      - name: Resolve npm dist-tag from version
        id: dist_tag
        run: |
          tag=$(node -p "const v=require('./packages/baileys/package.json').version; const m=v.match(/-([a-zA-Z]+)/); m?m[1]:'latest';")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing with dist-tag: $tag"

      - name: Build baileys
        run: pnpm --filter baileys build

      - name: Publish in NPM (as `baileys`)
        working-directory: packages/baileys
        run: npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.tag }}

      - name: Publish in NPM (whiskeysockets scope)
        working-directory: packages/baileys
        run: |
          npx json -I -f package.json -e "this.name='@whiskeysockets/baileys'"
          npm publish --access public --provenance --tag latest
          npx json -I -f package.json -e "this.name='baileys'"

      - name: Generate Changelog
        id: generate_changelog
        working-directory: packages/baileys
        run: |
          changelog=$(npm run changelog:last --silent)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${changelog}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Make Package
        working-directory: packages/baileys
        run: pnpm pack

      - name: Rename Pack
        working-directory: packages/baileys
        run: mv *.tgz baileys.tgz

      - name: Create Release
        uses: meeDamian/github-release@2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          body: ${{ steps.generate_changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: >
            packages/baileys/baileys.tgz
          gzip: folders
          allow_override: true
